# Attrition microservices stack — single orchestrator, driven entirely by /.env
# Public entry: cloudflared (token) -> nginx -> { web (Next.js) | gateway (YARP) -> services }.
# Build context ./backend so each Dockerfile pulls in building-blocks + services.
name: attrition

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [ attrition-net ]

x-healthcheck: &svc-healthcheck
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 10s
    timeout: 3s
    retries: 5

x-jwt-env: &jwt-env
  Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
  Jwt__Issuer: ${JWT_ISSUER:-attrition-api}
  Jwt__Audience: ${JWT_AUDIENCE:-attrition-web}
  Internal__ApiKey: ${INTERNAL_API_KEY:?INTERNAL_API_KEY must be set in .env}

x-redis-env: &redis-env
  Redis__Connection: ${REDIS_CONNECTION:-redis:6379}
  Redis__DefaultTtlMinutes: ${REDIS_DEFAULT_TTL_MINUTES:-10}

services:
  # ─────────────── Infrastructure ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: attrition-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-attrition}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    # Bound to loopback only — backend services reach Postgres over attrition-net, not the host.
    ports: [ "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5432" ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-attrition}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [ attrition-net ]

  redis:
    image: redis:7-alpine
    container_name: attrition-redis
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Loopback only — backend services reach Redis over attrition-net. Cache is ephemeral
    # (no persistence): it's a performance layer, never a source of truth.
    ports: [ "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379" ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [ attrition-net ]

  # ─────────────── Backups ───────────────
  # Periodic pg_dump of the whole database. Backups land in a HOST path OUTSIDE the project
  # dir (BACKUP_HOST_DIR, default /opt/attrition-backups) so deploy.py's project-dir wipe can
  # never delete them. Optionally shipped off-host via rclone. See docs/backups.md.
  db-backup:
    image: postgres:16-alpine   # same major as the server → pg_dump is compatible
    container_name: attrition-db-backup
    entrypoint: ["/bin/sh", "/db-backup.sh"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-attrition}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:-}
    volumes:
      - ./scripts/db-backup.sh:/db-backup.sh:ro
      - ${BACKUP_HOST_DIR:-/opt/attrition-backups}:/backups
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    networks: [ attrition-net ]

  identity-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Identity.Service/Dockerfile }
    container_name: attrition-identity
    environment:
      <<: *jwt-env
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      App__ClientUrl: ${APP_CLIENT_URL:-http://localhost:3000}
      Seed__Admin__Username: ${ADMIN_USERNAME:-}
      Seed__Admin__Password: ${ADMIN_PASSWORD:-}
      Seed__Admin__Email: ${ADMIN_EMAIL:-}
      FileUpload__UploadPath: ${UPLOAD_PATH:-/app/uploads}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-Attrition}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
    volumes: [ "identity-data:/app/uploads" ]
    depends_on:
      postgres: { condition: service_healthy }

  enemy-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Enemy.Service/Dockerfile }
    container_name: attrition-enemy
    environment:
      <<: [ *jwt-env, *redis-env ]
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
    depends_on:
      postgres: { condition: service_healthy }

  wiki-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Wiki.Service/Dockerfile }
    container_name: attrition-wiki
    environment:
      <<: [ *jwt-env, *redis-env ]
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
    depends_on:
      postgres: { condition: service_healthy }

  forum-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Forum.Service/Dockerfile }
    container_name: attrition-forum
    environment:
      <<: [ *jwt-env, *redis-env ]
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
    depends_on:
      postgres: { condition: service_healthy }

  assets-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Assets.Service/Dockerfile }
    container_name: attrition-assets
    environment:
      <<: *jwt-env
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      FileUpload__UploadPath: ${UPLOAD_PATH:-/app/uploads}
      FileUpload__MaxImageSizeMB: ${ASSET_MAX_SIZE_MB:-50}
    volumes: [ "assets-data:/app/uploads" ]
    depends_on:
      postgres: { condition: service_healthy }

  music-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Music.Service/Dockerfile }
    container_name: attrition-music
    environment:
      <<: [ *jwt-env, *redis-env ]
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      FileUpload__UploadPath: ${UPLOAD_PATH:-/app/uploads}
    volumes: [ "music-data:/app/uploads" ]
    depends_on:
      postgres: { condition: service_healthy }

  character-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Character.Service/Dockerfile }
    container_name: attrition-character
    environment:
      <<: *jwt-env
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-attrition};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Services__Identity: "http://identity-service:8080/"
    depends_on:
      postgres: { condition: service_healthy }


  # ─────────────── Aggregators (no DB) ───────────────
  search-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Search.Service/Dockerfile }
    container_name: attrition-search
    environment:
      <<: [ *jwt-env, *redis-env ]
      Services__Wiki: "http://wiki-service:8080/"
      Services__Forum: "http://forum-service:8080/"
      Services__Identity: "http://identity-service:8080/"
      Services__Enemy: "http://enemy-service:8080/"
    depends_on: [ wiki-service, forum-service, identity-service, enemy-service ]

  admin-service:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Admin.Service/Dockerfile }
    container_name: attrition-admin
    environment:
      <<: *jwt-env
      Services__Identity: "http://identity-service:8080/"
      Services__Enemy: "http://enemy-service:8080/"
      Services__Wiki: "http://wiki-service:8080/"
      Services__Forum: "http://forum-service:8080/"
      Services__Assets: "http://assets-service:8080/"
      Services__Music: "http://music-service:8080/"
    depends_on: [ identity-service, enemy-service, wiki-service, forum-service, assets-service, music-service ]

  # ─────────────── Gateway (YARP) ───────────────
  gateway:
    <<: [ *service-defaults, *svc-healthcheck ]
    build: { context: ./backend, dockerfile: services/Gateway/Dockerfile }
    container_name: attrition-gateway
    ports: [ "${GATEWAY_HOST_BIND:-127.0.0.1}:${GATEWAY_HOST_PORT:-8080}:8080" ]   # loopback by default; nginx reaches it over the docker network in prod
    environment:
      Cors__Origins: ${CORS_ORIGINS:-http://localhost:3000,https://attrition.io.vn}
      Gateway__MaxRequestBodySizeMB: ${GATEWAY_MAX_BODY_MB:-110}
    depends_on:
      - identity-service
      - enemy-service
      - wiki-service
      - forum-service
      - assets-service
      - music-service
      - character-service
      - search-service
      - admin-service

  # ─────────────── Edge: Next.js frontend + nginx + cloudflared ───────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: attrition-web
    expose: [ "3000" ]
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      gateway: { condition: service_started }
    restart: unless-stopped
    networks: [ attrition-net ]

  nginx:
    image: nginx:alpine
    container_name: attrition-nginx
    ports: [ "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-3000}:80" ]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - gateway
    restart: unless-stopped
    networks: [ attrition-net ]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: attrition-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    networks: [ attrition-net ]

volumes:
  pgdata:
  identity-data:
  assets-data:
  music-data:

networks:
  attrition-net:
    driver: bridge
