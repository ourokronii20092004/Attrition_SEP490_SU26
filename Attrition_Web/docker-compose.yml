version: '3.8'

services:
  # ── Nginx: reverse proxy for web domain ───────────────────
  # attrition.hault.io.vn → port 3000 → nginx
  # nginx routes /api/* → api:5000, /uploads/* → api:5000, else → web:3000
  nginx:
    image: nginx:alpine
    container_name: attrition-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks: [attrition-net]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://attrition.hault.io.vn
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_COLLECTION_URL=https://collection.hault.io.vn
    container_name: attrition-web
    expose: ["3000"]
    environment:
      - API_URL=http://api:5000
      - NEXT_PUBLIC_API_URL=https://attrition.hault.io.vn
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
    networks: [attrition-net]

  # ── Collection: runs on port 3001 directly ────────────────
  # collection.hault.io.vn → port 3001 → collection container
  # API calls go to NEXT_PUBLIC_API_URL (attrition.hault.io.vn/api) → nginx → api
  collection:
    build:
      context: ./collection
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://attrition.hault.io.vn
        - NEXT_PUBLIC_WEB_URL=https://attrition.hault.io.vn
    container_name: attrition-collection
    ports: ["3001:3001"]
    environment:
      - API_URL=http://api:5000
      - PORT=3001
      - NEXT_PUBLIC_API_URL=https://attrition.hault.io.vn
      - NEXT_PUBLIC_WEB_URL=https://attrition.hault.io.vn
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
    networks: [attrition-net]

  api:
    build: { context: ./api, dockerfile: Dockerfile }
    container_name: attrition-api
    expose: ["5000"]
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__ConnectionString=${REDIS_URL}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__AccessTokenExpiryMinutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
      - FileUpload__MaxAvatarSizeMB=${MAX_AVATAR_SIZE_MB}
      - FileUpload__UploadPath=${UPLOAD_PATH}
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - uploads:/app/uploads
      - musicdata:/app/uploads/music
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [attrition-net]

  db:
    image: postgres:16-alpine
    container_name: attrition-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5435:5432"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [attrition-net]

  redis:
    image: redis:7-alpine
    container_name: attrition-redis
    command: redis-server --appendonly yes
    volumes: [redisdata:/data]
    ports: ["6379:6379"]
    restart: unless-stopped
    networks: [attrition-net]

volumes:
  pgdata:
  redisdata:
  uploads:
  musicdata:

networks:
  attrition-net:
    driver: bridge